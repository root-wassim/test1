name: music_app
description: A secure Flutter audio app with Firebase and biometric auth.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

  # Audio
  just_audio: ^0.9.39
  just_audio_background: ^0.0.1-beta.11
  audio_session: ^0.1.21

  # Biometric
  local_auth: ^2.2.0

  # UI
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Storage & Utils
  shared_preferences: ^2.2.3
  http: ^1.2.1
  provider: ^6.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.2
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  dio: ^5.4.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/


